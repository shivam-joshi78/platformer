<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Platformer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    canvas {
      border: 2px solid #e94560;
      border-radius: 4px;
    }
  </style>
</head>

<body>
  <canvas id="game" width="800" height="500"></canvas>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    // Game state
    let gameState = 'playing';
    let cameraX = 0;
    const WORLD_WIDTH = 4800;

    // Speedrun timer
    let timerStart = 0;
    let timerElapsed = 0;
    let timerRunning = false;
    let bestTime = parseFloat(localStorage.getItem('platformer_best2')) || null;
    let splits = [];
    const splitZones = [800, 1600, 2400, 3200, 4000];
    const splitHit = new Set();

    // Player
    const player = {
      x: 50, y: 300, w: 28, h: 36,
      vx: 0, vy: 0,
      speed: 4, jumpForce: -11, gravity: 0.55,
      grounded: false, facing: 1,
      coins: 0
    };

    // Grapple state
    const grapple = {
      active: false,
      hookedPoint: null,
      ropeLen: 0,
      angle: 0,
      angularVel: 0,
      firing: false,
      fireX: 0, fireY: 0,
      fireDx: 0, fireDy: 0,
      fireTimer: 0,
      retractSpeed: 0       // auto-retract on hook
    };
    const GRAPPLE_RANGE = 280;
    const GRAPPLE_FIRE_SPEED = 20;

    // Grapple anchor points (rings in the sky) [x, y]
    const anchors = [
      // Zone 1: intro
      [350, 280],
      // Zone 2: gap crossing
      [680, 200], [820, 150],
      // Zone 3: vertical climb
      [1150, 180], [1300, 120],
      // Zone 4: big chasm
      [1650, 200], [1800, 160], [1950, 200],
      // Zone 5: sky highway
      [2250, 130], [2400, 100], [2550, 140],
      // Zone 6: cave descent
      [2900, 250], [3050, 300],
      // Zone 7: lava zone
      [3400, 180], [3550, 150], [3700, 190],
      // Zone 8: final gauntlet
      [4050, 160], [4200, 120], [4400, 180],
    ];

    // Platforms: [x, y, width, height]
    const platforms = [
      // === ZONE 1: Grasslands intro ===
      [0, 460, 350, 40],
      [200, 360, 100, 16],
      [430, 460, 180, 40],
      [500, 340, 90, 16],
      // === ZONE 2: Forest gaps ===
      [700, 460, 250, 40],
      [850, 350, 80, 16],
      [1000, 400, 120, 16],
      [1000, 460, 150, 40],
      // === ZONE 3: Mountain climb ===
      [1200, 460, 200, 40],
      [1250, 350, 80, 16],
      [1350, 280, 80, 16],
      [1450, 220, 100, 16],
      [1500, 460, 100, 40],
      // === ZONE 4: Big chasm (grapple required) ===
      [1600, 460, 120, 40],
      // big gap — need grapple anchors to cross
      [2000, 460, 150, 40],
      [2050, 350, 80, 16],
      // === ZONE 5: Sky highway ===
      [2200, 460, 100, 40],
      [2350, 380, 80, 16],
      [2500, 320, 80, 16],
      [2600, 460, 200, 40],
      [2650, 260, 100, 16],
      // === ZONE 6: Cave/underground ===
      [2850, 460, 300, 40],
      [2900, 350, 120, 16],
      [3050, 420, 80, 16],
      [3150, 460, 200, 40],
      [3100, 300, 80, 16],
      // === ZONE 7: Lava zone ===
      [3400, 460, 100, 40],
      [3550, 460, 80, 40],
      [3700, 460, 100, 40],
      [3500, 340, 70, 16],
      [3650, 280, 70, 16],
      [3800, 350, 80, 16],
      // === ZONE 8: Final gauntlet ===
      [3900, 460, 150, 40],
      [4000, 340, 80, 16],
      [4100, 260, 80, 16],
      [4200, 460, 200, 40],
      [4250, 340, 100, 16],
      [4450, 460, 350, 40],
      [4500, 350, 80, 16],
      [4600, 260, 100, 16],
    ];

    // Moving platforms: {x, y, w, h, startX, endX, startY, endY, speed, axis}
    const movingPlatforms = [
      // Zone 2: horizontal mover
      { x: 950, y: 300, w: 80, h: 16, startX: 900, endX: 1100, startY: 300, endY: 300, speed: 1, dir: 1, axis: 'x' },
      // Zone 5: vertical elevator
      { x: 2450, y: 460, w: 70, h: 16, startX: 2450, endX: 2450, startY: 250, endY: 460, speed: 1.2, dir: 1, axis: 'y' },
      // Zone 6: horizontal cave mover
      { x: 2950, y: 250, w: 80, h: 16, startX: 2900, endX: 3100, startY: 250, endY: 250, speed: 0.8, dir: 1, axis: 'x' },
      // Zone 7: lava hoppers
      { x: 3450, y: 420, w: 60, h: 16, startX: 3430, endX: 3530, startY: 420, endY: 420, speed: 1.5, dir: 1, axis: 'x' },
      { x: 3620, y: 400, w: 60, h: 16, startX: 3600, endX: 3700, startY: 380, endY: 440, speed: 1, dir: 1, axis: 'y' },
      // Zone 8: final vertical lift
      { x: 4350, y: 460, w: 70, h: 16, startX: 4350, endX: 4350, startY: 200, endY: 460, speed: 1.5, dir: 1, axis: 'y' },
    ];

    // Coins
    const coins = [
      // Zone 1
      [100, 430], [250, 330], [530, 310],
      // Zone 2
      [750, 430], [880, 320], [1050, 370],
      // Zone 3
      [1280, 320], [1380, 250], [1490, 190],
      // Zone 4 (grapple zone rewards)
      [1700, 180], [1830, 140], [1970, 180],
      // Zone 5
      [2250, 100], [2400, 80], [2550, 120], [2690, 230],
      // Zone 6
      [2930, 320], [3000, 230], [3130, 270],
      // Zone 7
      [3430, 430], [3530, 310], [3680, 250], [3830, 320],
      // Zone 8
      [3950, 430], [4040, 310], [4150, 230], [4300, 310],
      [4550, 320], [4640, 230],
    ];
    const collectedCoins = new Set();
    const totalCoins = coins.length;

    // Spikes
    const spikes = [
      [380, 448, 40],
      [650, 448, 40],
      [1170, 448, 30],
      // Lava zone floor spikes
      [3350, 448, 40],
      [3510, 448, 30],
      [3640, 448, 50],
      [3810, 448, 40],
      // Final gauntlet
      [4050, 448, 50],
      [4400, 448, 40],
    ];

    // Flag (goal) — moved to end
    const flag = { x: 4700, y: 380, w: 20, h: 80 };

    // Enemies
    const enemyData = [
      { x: 750, y: 428, w: 30, h: 30, startX: 720, endX: 920, speed: 1.5, dir: 1 },
      { x: 1220, y: 428, w: 30, h: 30, startX: 1210, endX: 1380, speed: 1.2, dir: 1 },
      // Cave enemies
      { x: 2880, y: 428, w: 30, h: 30, startX: 2860, endX: 3120, speed: 1.8, dir: 1 },
      { x: 3050, y: 388, w: 30, h: 30, startX: 3050, endX: 3130, speed: 1, dir: 1 },
      // Lava zone
      { x: 3420, y: 428, w: 30, h: 30, startX: 3410, endX: 3490, speed: 2, dir: 1 },
      { x: 3720, y: 428, w: 30, h: 30, startX: 3710, endX: 3790, speed: 2, dir: 1 },
      // Final zone
      { x: 3920, y: 428, w: 30, h: 30, startX: 3910, endX: 4040, speed: 1.5, dir: 1 },
      { x: 4250, y: 428, w: 30, h: 30, startX: 4210, endX: 4390, speed: 2, dir: 1 },
      { x: 4500, y: 428, w: 30, h: 30, startX: 4460, endX: 4750, speed: 1.8, dir: 1 },
    ];
    let enemies = [];

    // Input
    const keys = {};
    const keysPressed = {};
    window.addEventListener('keydown', e => {
      if (!keys[e.code]) keysPressed[e.code] = true;
      keys[e.code] = true;
      if (['Space', 'ArrowUp', 'ArrowDown'].includes(e.code)) e.preventDefault();
    });
    window.addEventListener('keyup', e => keys[e.code] = false);

    // Particles
    const particles = [];

    function spawnParticles(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        particles.push({
          x, y, vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6,
          life: 30 + Math.random() * 20, color, size: 2 + Math.random() * 3
        });
      }
    }

    function formatTime(ms) {
      const mins = Math.floor(ms / 60000);
      const secs = Math.floor((ms % 60000) / 1000);
      const centis = Math.floor((ms % 1000) / 10);
      return `${mins}:${secs.toString().padStart(2, '0')}.${centis.toString().padStart(2, '0')}`;
    }

    function restart() {
      player.x = 50; player.y = 300; player.vx = 0; player.vy = 0;
      player.coins = 0; player.grounded = false;
      collectedCoins.clear();
      enemies = enemyData.map(e => ({ ...e }));
      movingPlatforms.forEach(mp => {
        if (mp.axis === 'x') mp.x = mp.startX;
        else mp.y = mp.startY;
        mp.dir = 1;
      });
      gameState = 'playing';
      particles.length = 0;
      grapple.active = false;
      grapple.firing = false;
      grapple.hookedPoint = null;
      timerStart = performance.now();
      timerElapsed = 0;
      timerRunning = true;
      splits = [];
      splitHit.clear();
    }

    function rectCollision(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function dist(x1, y1, x2, y2) {
      return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
    }

    function findNearestAnchor() {
      const px = player.x + player.w / 2;
      const py = player.y + player.h / 2;
      let best = null, bestDist = GRAPPLE_RANGE;
      for (const a of anchors) {
        const d = dist(px, py, a[0], a[1]);
        if (d < bestDist) {
          bestDist = d;
          best = { x: a[0], y: a[1] };
        }
      }
      return best;
    }

    function getAllPlatforms() {
      const all = platforms.map(p => ({ x: p[0], y: p[1], w: p[2], h: p[3] }));
      for (const mp of movingPlatforms) {
        all.push({ x: mp.x, y: mp.y, w: mp.w, h: mp.h });
      }
      return all;
    }

    function update() {
      if (gameState !== 'playing') {
        if (keys['KeyR']) restart();
        // Clear pressed keys
        for (const k in keysPressed) keysPressed[k] = false;
        return;
      }

      // Update moving platforms
      for (const mp of movingPlatforms) {
        const prevX = mp.x, prevY = mp.y;
        if (mp.axis === 'x') {
          mp.x += mp.speed * mp.dir;
          if (mp.x <= mp.startX || mp.x + mp.w >= mp.endX + mp.w) mp.dir *= -1;
        } else {
          mp.y += mp.speed * mp.dir;
          if (mp.y <= mp.startY || mp.y >= mp.endY) mp.dir *= -1;
        }
        // Carry player if standing on this platform
        if (player.grounded &&
          player.x + player.w > mp.x && player.x < mp.x + mp.w &&
          Math.abs((player.y + player.h) - mp.y) < 4) {
          player.x += mp.x - prevX;
          player.y += mp.y - prevY;
        }
      }

      const allPlats = getAllPlatforms();

      // === GRAPPLE HOOK ===
      // Fire grapple
      if (keysPressed['KeyE'] || keysPressed['ShiftLeft'] || keysPressed['ShiftRight']) {
        if (!grapple.active && !grapple.firing) {
          const target = findNearestAnchor();
          if (target) {
            grapple.firing = true;
            grapple.fireX = player.x + player.w / 2;
            grapple.fireY = player.y + player.h / 2;
            const angle = Math.atan2(target.y - grapple.fireY, target.x - grapple.fireX);
            grapple.fireDx = Math.cos(angle) * GRAPPLE_FIRE_SPEED;
            grapple.fireDy = Math.sin(angle) * GRAPPLE_FIRE_SPEED;
            grapple.hookedPoint = target;
            grapple.fireTimer = 0;
          }
        } else if (grapple.active) {
          // Release grapple
          grapple.active = false;
          grapple.hookedPoint = null;
        }
      }

      // Grapple firing animation
      if (grapple.firing) {
        grapple.fireX += grapple.fireDx;
        grapple.fireY += grapple.fireDy;
        grapple.fireTimer++;
        const d = dist(grapple.fireX, grapple.fireY, grapple.hookedPoint.x, grapple.hookedPoint.y);
        if (d < 20) {
          // Hook connected
          grapple.firing = false;
          grapple.active = true;
          const px = player.x + player.w / 2;
          const py = player.y + player.h / 2;
          grapple.ropeLen = dist(px, py, grapple.hookedPoint.x, grapple.hookedPoint.y);
          grapple.angle = Math.atan2(py - grapple.hookedPoint.y, px - grapple.hookedPoint.x);
          // Convert current velocity to angular velocity (preserve momentum)
          const tangentX = -Math.sin(grapple.angle);
          const tangentY = Math.cos(grapple.angle);
          grapple.angularVel = (player.vx * tangentX + player.vy * tangentY) / grapple.ropeLen;
          // Add a minimum swing if player had downward velocity (feels like catching)
          if (Math.abs(grapple.angularVel) < 0.015 && player.vy > 2) {
            grapple.angularVel = player.facing * 0.02;
          }
          // Auto-retract: pull player toward anchor smoothly
          grapple.retractSpeed = grapple.ropeLen > 120 ? 4 : 0;
          spawnParticles(grapple.hookedPoint.x, grapple.hookedPoint.y, '#ff6b6b', 5);
        }
        if (grapple.fireTimer > 30) {
          grapple.firing = false;
          grapple.hookedPoint = null;
        }
      }

      // Grapple swing physics
      if (grapple.active && grapple.hookedPoint) {
        // Auto-retract rope on initial hook (pulls you in smoothly)
        if (grapple.retractSpeed > 0) {
          grapple.ropeLen -= grapple.retractSpeed;
          grapple.retractSpeed *= 0.92; // ease out
          if (grapple.retractSpeed < 0.5) grapple.retractSpeed = 0;
          if (grapple.ropeLen < 50) grapple.ropeLen = 50;
        }

        // Pendulum gravity — scale with rope length for consistent feel
        const pendulumGravity = 0.4;
        grapple.angularVel += (pendulumGravity * Math.cos(grapple.angle)) / grapple.ropeLen;

        // Very low damping — let momentum carry
        grapple.angularVel *= 0.998;

        // Strong player input — pump the swing
        const swingInput = 0.008;
        if (keys['ArrowLeft'] || keys['KeyA']) {
          grapple.angularVel -= swingInput;
          player.facing = -1;
        }
        if (keys['ArrowRight'] || keys['KeyD']) {
          grapple.angularVel += swingInput;
          player.facing = 1;
        }

        // Climb rope (fast and responsive)
        if (keys['ArrowUp'] || keys['KeyW']) {
          grapple.ropeLen = Math.max(35, grapple.ropeLen - 3.5);
        }
        if (keys['ArrowDown'] || keys['KeyS']) {
          grapple.ropeLen = Math.min(GRAPPLE_RANGE, grapple.ropeLen + 3);
        }

        grapple.angle += grapple.angularVel;

        // Update player position from pendulum
        player.x = grapple.hookedPoint.x + Math.cos(grapple.angle) * grapple.ropeLen - player.w / 2;
        player.y = grapple.hookedPoint.y + Math.sin(grapple.angle) * grapple.ropeLen - player.h / 2;

        // Convert angular velocity to linear velocity (full momentum preserved)
        player.vx = -Math.sin(grapple.angle) * grapple.angularVel * grapple.ropeLen;
        player.vy = Math.cos(grapple.angle) * grapple.angularVel * grapple.ropeLen;

        // Swing trail particles
        if (Math.abs(grapple.angularVel) > 0.02) {
          spawnParticles(player.x + player.w / 2, player.y + player.h, 'rgba(255,107,107,0.5)', 1);
        }

        // Release with E/Shift — preserves full momentum
        if (keysPressed['KeyE'] || keysPressed['ShiftLeft'] || keysPressed['ShiftRight']) {
          const releaseBoost = 1.15; // slight launch boost
          player.vx *= releaseBoost;
          player.vy *= releaseBoost;
          grapple.active = false;
          grapple.hookedPoint = null;
          spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#ff6b6b', 6);
        }

        // Jump release — full momentum + upward kick
        if (keysPressed['Space']) {
          const speed = Math.sqrt(player.vx ** 2 + player.vy ** 2);
          const launchBoost = 1.25;
          player.vx *= launchBoost;
          player.vy *= launchBoost;
          // Add upward kick (stronger when moving fast)
          player.vy = Math.min(player.vy, -Math.max(6, speed * 0.5));
          grapple.active = false;
          grapple.hookedPoint = null;
          spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#ff6b6b', 8);
        }

        // Platform collision while swinging
        player.grounded = false;
        for (const plat of allPlats) {
          if (rectCollision(player, plat)) {
            // Only detach if landing on top
            if (player.vy > 0 && player.y + player.h - plat.y < 15) {
              player.y = plat.y - player.h;
              player.vy = 0;
              player.grounded = true;
              grapple.active = false;
              grapple.hookedPoint = null;
            } else if (player.vy < 0 && player.y < plat.y + plat.h) {
              // Bonk head — don't detach, just stop upward
              player.y = plat.y + plat.h;
              player.vy = 0;
              grapple.angularVel *= 0.5;
            }
            break;
          }
        }
      } else if (!grapple.active) {
        // Normal movement (not grappling)
        player.vx = 0;
        if (keys['ArrowLeft'] || keys['KeyA']) { player.vx = -player.speed; player.facing = -1; }
        if (keys['ArrowRight'] || keys['KeyD']) { player.vx = player.speed; player.facing = 1; }

        if ((keys['ArrowUp'] || keys['KeyW'] || keys['Space']) && player.grounded) {
          player.vy = player.jumpForce;
          player.grounded = false;
        }

        player.vy += player.gravity;
        if (player.vy > 12) player.vy = 12;

        // Move X
        player.x += player.vx;
        for (const plat of allPlats) {
          if (rectCollision(player, plat)) {
            if (player.vx > 0) player.x = plat.x - player.w;
            else if (player.vx < 0) player.x = plat.x + plat.w;
          }
        }

        // Move Y
        player.y += player.vy;
        player.grounded = false;
        for (const plat of allPlats) {
          if (rectCollision(player, plat)) {
            if (player.vy > 0) {
              player.y = plat.y - player.h;
              player.vy = 0;
              player.grounded = true;
            } else if (player.vy < 0) {
              player.y = plat.y + plat.h;
              player.vy = 0;
            }
          }
        }
      }

      // Fall off screen
      if (player.y > 550) {
        gameState = 'dead';
        grapple.active = false;
        grapple.firing = false;
        spawnParticles(player.x + player.w / 2, player.y, '#e94560', 20);
      }

      // World bounds
      if (player.x < 0) player.x = 0;
      if (player.x + player.w > WORLD_WIDTH) player.x = WORLD_WIDTH - player.w;

      // Coins
      coins.forEach((c, i) => {
        if (collectedCoins.has(i)) return;
        const coinRect = { x: c[0] - 10, y: c[1] - 10, w: 20, h: 20 };
        if (rectCollision(player, coinRect)) {
          collectedCoins.add(i);
          player.coins++;
          spawnParticles(c[0], c[1], '#ffd700', 8);
        }
      });

      // Spikes
      for (const s of spikes) {
        const spikeRect = { x: s[0], y: s[1], w: s[2], h: 12 };
        if (rectCollision(player, spikeRect)) {
          gameState = 'dead';
          grapple.active = false;
          grapple.firing = false;
          spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#e94560', 20);
        }
      }

      // Enemies
      for (const e of enemies) {
        e.x += e.speed * e.dir;
        if (e.x <= e.startX || e.x + e.w >= e.endX) e.dir *= -1;
        if (rectCollision(player, e)) {
          if (player.vy > 0 && player.y + player.h - e.y < 15) {
            player.vy = -8;
            e.startX = -100; e.endX = -100; e.x = -100; e.y = -100;
            spawnParticles(e.x + e.w / 2, e.y + e.h / 2, '#e94560', 12);
          } else {
            gameState = 'dead';
            grapple.active = false;
            grapple.firing = false;
            spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#e94560', 20);
          }
        }
      }

      // Speedrun splits
      if (timerRunning) {
        timerElapsed = performance.now() - timerStart;
        for (let i = 0; i < splitZones.length; i++) {
          if (!splitHit.has(i) && player.x >= splitZones[i]) {
            splitHit.add(i);
            splits.push(timerElapsed);
          }
        }
      }

      // Flag
      if (rectCollision(player, flag)) {
        gameState = 'won';
        timerRunning = false;
        timerElapsed = performance.now() - timerStart;
        if (!bestTime || timerElapsed < bestTime) {
          bestTime = timerElapsed;
          localStorage.setItem('platformer_best2', bestTime.toString());
        }
        spawnParticles(flag.x + flag.w / 2, flag.y, '#00ff88', 30);
      }

      // Particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }

      // Camera
      const targetCam = player.x - canvas.width / 3;
      cameraX += (targetCam - cameraX) * 0.1;
      if (cameraX < 0) cameraX = 0;
      if (cameraX > WORLD_WIDTH - canvas.width) cameraX = WORLD_WIDTH - canvas.width;

      // Clear pressed keys at end of frame
      for (const k in keysPressed) keysPressed[k] = false;
    }

    // Get zone color theme based on x position
    function getZoneColors(x) {
      if (x < 1200) return { sky1: '#0f3460', sky2: '#16213e', mtn: '#1a1a3e', plat: ['#4ecca3', '#3b8a6e', '#2d6a4f'], top: '#7fffd4' };
      if (x < 2200) return { sky1: '#1a0a3e', sky2: '#0d1b2a', mtn: '#15102e', plat: ['#7b68ae', '#5c4d8a', '#4a3d6e'], top: '#b8a9d4' };
      if (x < 2800) return { sky1: '#0a2463', sky2: '#1e1b4b', mtn: '#0f1a3e', plat: ['#3a86c8', '#2d6aa0', '#1e4d7a'], top: '#7ec8e3' };
      if (x < 3400) return { sky1: '#1a1a2e', sky2: '#0d0d1a', mtn: '#12121e', plat: ['#555555', '#444444', '#333333'], top: '#777777' };
      if (x < 4000) return { sky1: '#3d0c02', sky2: '#1a0500', mtn: '#2a0800', plat: ['#8b4513', '#6b3410', '#4b240d'], top: '#cd853f' };
      return { sky1: '#0f3460', sky2: '#16213e', mtn: '#1a1a3e', plat: ['#4ecca3', '#3b8a6e', '#2d6a4f'], top: '#7fffd4' };
    }

    function draw() {
      // Sky gradient based on zone
      const zone = getZoneColors(cameraX + canvas.width / 2);
      const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
      skyGrad.addColorStop(0, zone.sky1);
      skyGrad.addColorStop(1, zone.sky2);
      ctx.fillStyle = skyGrad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Background stars
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      for (let i = 0; i < 80; i++) {
        const sx = ((i * 137 + 50) % WORLD_WIDTH) - cameraX * 0.3;
        const sy = (i * 97 + 30) % (canvas.height - 100);
        if (sx >= -5 && sx <= canvas.width + 5) {
          ctx.fillRect(sx, sy, 2, 2);
        }
      }

      // Background mountains
      ctx.fillStyle = zone.mtn;
      for (let i = 0; i < WORLD_WIDTH; i += 200) {
        const mx = i - cameraX * 0.4;
        if (mx > -250 && mx < canvas.width + 50) {
          ctx.beginPath();
          ctx.moveTo(mx, 460);
          ctx.lineTo(mx + 100, 460 - 80 - (i % 100));
          ctx.lineTo(mx + 200, 460);
          ctx.fill();
        }
      }

      // Lava zone bottom glow
      if (cameraX + canvas.width > 3400 && cameraX < 4000) {
        const lavaGrad = ctx.createLinearGradient(0, 460, 0, 500);
        lavaGrad.addColorStop(0, 'rgba(255,60,0,0.6)');
        lavaGrad.addColorStop(1, 'rgba(255,60,0,0)');
        ctx.fillStyle = lavaGrad;
        ctx.fillRect(0, 460, canvas.width, 40);
      }

      ctx.save();
      ctx.translate(-cameraX, 0);

      // Grapple anchors
      for (const a of anchors) {
        if (a[0] < cameraX - 50 || a[0] > cameraX + canvas.width + 50) continue;
        const px = player.x + player.w / 2;
        const py = player.y + player.h / 2;
        const d = dist(px, py, a[0], a[1]);
        const inRange = d < GRAPPLE_RANGE;
        // Ring
        ctx.strokeStyle = inRange ? '#ff6b6b' : '#555';
        ctx.lineWidth = inRange ? 3 : 2;
        ctx.beginPath();
        ctx.arc(a[0], a[1], 10, 0, Math.PI * 2);
        ctx.stroke();
        // Dot
        ctx.fillStyle = inRange ? '#ff6b6b' : '#444';
        ctx.beginPath();
        ctx.arc(a[0], a[1], 4, 0, Math.PI * 2);
        ctx.fill();
        // Glow when in range
        if (inRange) {
          ctx.strokeStyle = 'rgba(255,107,107,0.3)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(a[0], a[1], 16 + Math.sin(Date.now() / 200) * 3, 0, Math.PI * 2);
          ctx.stroke();
        }
      }

      // Grapple rope
      if (grapple.active && grapple.hookedPoint) {
        const rpx = player.x + player.w / 2;
        const rpy = player.y + player.h / 2;
        const tension = Math.min(1, Math.abs(grapple.angularVel) * 15);
        // Rope sag (less sag = more tension = more speed)
        const midX = (rpx + grapple.hookedPoint.x) / 2;
        const midY = (rpy + grapple.hookedPoint.y) / 2 + (1 - tension) * 20;
        ctx.strokeStyle = `rgba(255,${100 + tension * 155},${100 + tension * 100},${0.7 + tension * 0.3})`;
        ctx.lineWidth = 2 + tension;
        ctx.beginPath();
        ctx.moveTo(rpx, rpy);
        ctx.quadraticCurveTo(midX, midY, grapple.hookedPoint.x, grapple.hookedPoint.y);
        ctx.stroke();
        // Glow at high speed
        if (tension > 0.5) {
          ctx.strokeStyle = `rgba(255,200,150,${(tension - 0.5) * 0.4})`;
          ctx.lineWidth = 5;
          ctx.beginPath();
          ctx.moveTo(rpx, rpy);
          ctx.quadraticCurveTo(midX, midY, grapple.hookedPoint.x, grapple.hookedPoint.y);
          ctx.stroke();
        }
      }
      // Grapple firing line
      if (grapple.firing && grapple.hookedPoint) {
        ctx.strokeStyle = 'rgba(255,107,107,0.6)';
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(player.x + player.w / 2, player.y + player.h / 2);
        ctx.lineTo(grapple.fireX, grapple.fireY);
        ctx.stroke();
        ctx.setLineDash([]);
        // Hook projectile
        ctx.fillStyle = '#ff6b6b';
        ctx.beginPath();
        ctx.arc(grapple.fireX, grapple.fireY, 4, 0, Math.PI * 2);
        ctx.fill();
      }

      // Static platforms
      for (const p of platforms) {
        if (p[0] + p[2] < cameraX - 50 || p[0] > cameraX + canvas.width + 50) continue;
        const zc = getZoneColors(p[0]);
        const grad = ctx.createLinearGradient(0, p[1], 0, p[1] + p[3]);
        grad.addColorStop(0, zc.plat[0]);
        grad.addColorStop(0.3, zc.plat[1]);
        grad.addColorStop(1, zc.plat[2]);
        ctx.fillStyle = grad;
        ctx.fillRect(p[0], p[1], p[2], p[3]);
        ctx.fillStyle = zc.top;
        ctx.fillRect(p[0], p[1], p[2], 3);
      }

      // Moving platforms
      for (const mp of movingPlatforms) {
        if (mp.x + mp.w < cameraX - 50 || mp.x > cameraX + canvas.width + 50) continue;
        ctx.fillStyle = '#e9a820';
        ctx.fillRect(mp.x, mp.y, mp.w, mp.h);
        ctx.fillStyle = '#ffd700';
        ctx.fillRect(mp.x, mp.y, mp.w, 3);
        // Arrow indicators
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        if (mp.axis === 'x') {
          ctx.fillText('\u2194', mp.x + mp.w / 2 - 5, mp.y + 12);
        } else {
          ctx.fillText('\u2195', mp.x + mp.w / 2 - 5, mp.y + 12);
        }
      }

      // Spikes
      for (const s of spikes) {
        if (s[0] + s[2] < cameraX - 50 || s[0] > cameraX + canvas.width + 50) continue;
        const isLava = s[0] > 3300 && s[0] < 3900;
        ctx.fillStyle = isLava ? '#ff4500' : '#e94560';
        const count = Math.floor(s[2] / 12);
        for (let i = 0; i < count; i++) {
          ctx.beginPath();
          ctx.moveTo(s[0] + i * 12, s[1] + 12);
          ctx.lineTo(s[0] + i * 12 + 6, s[1]);
          ctx.lineTo(s[0] + i * 12 + 12, s[1] + 12);
          ctx.fill();
        }
      }

      // Coins
      const coinBob = Math.sin(Date.now() / 300) * 3;
      coins.forEach((c, i) => {
        if (collectedCoins.has(i)) return;
        if (c[0] < cameraX - 50 || c[0] > cameraX + canvas.width + 50) return;
        ctx.fillStyle = '#ffd700';
        ctx.beginPath();
        ctx.arc(c[0], c[1] + coinBob, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ffed4a';
        ctx.beginPath();
        ctx.arc(c[0] - 2, c[1] + coinBob - 2, 3, 0, Math.PI * 2);
        ctx.fill();
      });

      // Enemies
      for (const e of enemies) {
        if (e.x < -50) continue;
        if (e.x + e.w < cameraX - 50 || e.x > cameraX + canvas.width + 50) continue;
        ctx.fillStyle = '#e94560';
        ctx.fillRect(e.x, e.y, e.w, e.h);
        ctx.fillStyle = 'white';
        const eyeOff = e.dir > 0 ? 6 : 2;
        ctx.fillRect(e.x + eyeOff, e.y + 8, 7, 7);
        ctx.fillRect(e.x + eyeOff + 14, e.y + 8, 7, 7);
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(e.x + eyeOff + 3, e.y + 10, 3, 4);
        ctx.fillRect(e.x + eyeOff + 17, e.y + 10, 3, 4);
      }

      // Flag
      ctx.fillStyle = '#888';
      ctx.fillRect(flag.x + 8, flag.y, 4, flag.h);
      const flagWave = Math.sin(Date.now() / 200) * 3;
      ctx.fillStyle = '#00ff88';
      ctx.beginPath();
      ctx.moveTo(flag.x + 12, flag.y);
      ctx.lineTo(flag.x + 45 + flagWave, flag.y + 12);
      ctx.lineTo(flag.x + 12, flag.y + 28);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = '14px monospace';
      ctx.fillText('G', flag.x + 18, flag.y + 20);

      // Player
      if (gameState !== 'dead') {
        ctx.fillStyle = '#00b4d8';
        ctx.fillRect(player.x + 4, player.y + 10, 20, 18);
        ctx.fillStyle = '#fca311';
        ctx.fillRect(player.x + 6, player.y, 16, 14);
        ctx.fillStyle = 'white';
        const px = player.facing > 0 ? 4 : 0;
        ctx.fillRect(player.x + 8 + px, player.y + 4, 5, 5);
        ctx.fillRect(player.x + 16 + px, player.y + 4, 5, 5);
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(player.x + 10 + px, player.y + 5, 2, 3);
        ctx.fillRect(player.x + 18 + px, player.y + 5, 2, 3);
        ctx.fillStyle = '#023e8a';
        const legAnim = player.vx !== 0 ? Math.sin(Date.now() / 80) * 3 : 0;
        ctx.fillRect(player.x + 6, player.y + 28, 7, 8 + legAnim);
        ctx.fillRect(player.x + 15, player.y + 28, 7, 8 - legAnim);
      }

      // Particles
      for (const p of particles) {
        ctx.globalAlpha = p.life / 50;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
      }
      ctx.globalAlpha = 1;

      ctx.restore();

      // UI
      ctx.fillStyle = '#ffd700';
      ctx.font = 'bold 20px monospace';
      ctx.fillText(`Coins: ${player.coins}/${totalCoins}`, 20, 35);

      // Grapple indicator
      if (gameState === 'playing') {
        const nearAnchor = findNearestAnchor();
        if (nearAnchor && !grapple.active) {
          ctx.fillStyle = 'rgba(255,107,107,0.7)';
          ctx.font = '13px monospace';
          ctx.fillText('[E/Shift] Grapple', 20, 60);
        }
        if (grapple.active) {
          ctx.fillStyle = '#ff6b6b';
          ctx.font = '13px monospace';
          ctx.fillText('GRAPPLED - Space to release', 20, 60);
        }
      }

      // Speedrun timer HUD
      if (timerRunning) {
        timerElapsed = performance.now() - timerStart;
      }
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 22px monospace';
      ctx.textAlign = 'right';
      ctx.fillText(formatTime(timerElapsed), canvas.width - 20, 30);
      if (bestTime) {
        ctx.fillStyle = '#00ff88';
        ctx.font = '14px monospace';
        ctx.fillText(`Best: ${formatTime(bestTime)}`, canvas.width - 20, 50);
      }
      ctx.font = '13px monospace';
      for (let i = 0; i < splits.length; i++) {
        ctx.fillStyle = '#aaa';
        ctx.fillText(`Split ${i + 1}: ${formatTime(splits[i])}`, canvas.width - 20, 70 + i * 18);
      }
      ctx.textAlign = 'left';

      // Game over / win screens
      if (gameState === 'won') {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#00ff88';
        ctx.font = 'bold 48px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('YOU WIN!', canvas.width / 2, canvas.height / 2 - 50);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 28px monospace';
        ctx.fillText(`Time: ${formatTime(timerElapsed)}`, canvas.width / 2, canvas.height / 2 - 10);
        if (bestTime === timerElapsed) {
          ctx.fillStyle = '#ffd700';
          ctx.font = 'bold 18px monospace';
          ctx.fillText('NEW BEST!', canvas.width / 2, canvas.height / 2 + 18);
        } else if (bestTime) {
          ctx.fillStyle = '#aaa';
          ctx.font = '16px monospace';
          ctx.fillText(`Best: ${formatTime(bestTime)}`, canvas.width / 2, canvas.height / 2 + 18);
        }
        ctx.fillStyle = '#ffd700';
        ctx.font = '20px monospace';
        ctx.fillText(`Coins: ${player.coins}/${totalCoins}`, canvas.width / 2, canvas.height / 2 + 48);
        ctx.fillStyle = '#fff';
        ctx.font = '18px monospace';
        ctx.fillText('Press R to restart', canvas.width / 2, canvas.height / 2 + 80);
        ctx.textAlign = 'left';
      } else if (gameState === 'dead') {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#e94560';
        ctx.font = 'bold 48px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
        ctx.fillStyle = '#fff';
        ctx.font = '18px monospace';
        ctx.fillText('Press R to restart', canvas.width / 2, canvas.height / 2 + 25);
        ctx.textAlign = 'left';
      } else {
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.font = '12px monospace';
        ctx.fillText('WASD/Arrows: move | Space: jump | E/Shift: grapple', 20, canvas.height - 15);
      }
    }

    // Fixed timestep
    const FIXED_DT = 1000 / 60;
    let lastTime = 0;
    let accumulator = 0;

    function gameLoop(timestamp) {
      if (!lastTime) lastTime = timestamp;
      let frameDelta = timestamp - lastTime;
      lastTime = timestamp;
      if (frameDelta > 200) frameDelta = 200;
      accumulator += frameDelta;
      while (accumulator >= FIXED_DT) {
        update();
        accumulator -= FIXED_DT;
      }
      draw();
      requestAnimationFrame(gameLoop);
    }

    // Init
    enemies = enemyData.map(e => ({ ...e }));
    timerStart = performance.now();
    timerRunning = true;

    requestAnimationFrame(gameLoop);
  </script>
</body>

</html>
